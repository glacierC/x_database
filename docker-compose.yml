services:
  app:
    build: .
    volumes:
      - ./data:/app/data
      - ./cookies:/app/cookies
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  dashboard:
    build: .
    command: python -m src.dashboard
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=./data/tweets.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    depends_on:
      - app
